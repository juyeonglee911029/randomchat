<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YELLOWCHAT</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header / Controls -->
        <header class="header animated-header">
            <div class="header-main">
                <div class="logo">
                    <div class="logo-icon-wrapper">
                        <svg class="logo-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15 10L20 6V18L15 14V17C15 18.1046 14.1046 19 13 19H4C2.89543 19 2 18.1046 2 17V7C2 5.89543 2.89543 5 4 5H13C14.1046 5 15 5.89543 15 7V10Z" fill="currentColor"/>
                        </svg>
                    </div>
                    <h1 class="logo-text"><span class="yellow">YELLOW</span><span class="chat">CHAT</span></h1>
                </div>

                <div class="header-right">
                    <div class="auth-container">
                        <div class="auth-wrapper" style="display: flex; flex-direction: column; align-items: flex-end; gap: 5px;">
                            <button id="googleLoginBtn" class="btn secondary">
                                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 18px; height: 18px; margin-right: 5px;">
                                Login
                            </button>
                            <div id="userInfo" style="display: none; align-items: center; gap: 10px;">
                                <span id="userName" style="font-weight: bold; color: white; font-size: 0.9rem;"></span>
                                <img id="userAvatar" src="" alt="Avatar" style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--primary);">
                            </div>
                        </div>
                    </div>

                    <div class="controls">
                        <button id="findMatchBtn" class="btn primary">
                            <i class="material-icons">shuffle</i>
                            <span class="btn-text">Find Stranger</span>
                        </button>
                        <button id="hangupBtn" class="btn danger" disabled>
                            <i class="material-icons">call_end</i>
                            <span class="btn-text">Stop</span>
                        </button>
                        <button id="settingsBtn" class="btn secondary">
                            <i class="material-icons">settings</i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <!-- Left AdSense Sidebar -->
            <aside class="ad-sidebar">
                <div class="ad-container">
                    <!-- Google AdSense Code -->
                    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4808753661346057" crossorigin="anonymous"></script>
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-client="ca-pub-4808753661346057"
                         data-ad-slot="1234567890"
                         data-ad-format="auto"
                         data-full-width-responsive="true"></ins>
                    <script>
                         (adsbygoogle = window.adsbygoogle || []).push({});
                    </script>
                    <div style="text-align:center; color: #888; font-size: 12px; margin-top: 10px;">Advertisement</div>
                </div>
            </aside>

            <!-- Video Area -->
            <section class="video-container">
                <div class="video-logo-overlay">
                    <span class="logo-text">YELLOWCHAT</span>
                </div>

                <div class="video-wrapper remote-wrapper">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div id="remoteStatus" class="video-status">Waiting for partner...</div>
                    <div class="partner-info" id="partnerInfo" style="display: none;">
                        <div class="partner-insta-overlay">
                            <svg class="social-svg-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                            </svg>
                            <span id="partnerInstaIdTop"></span>
                        </div>
                    </div>
                    <!-- Partner floating social icons -->
                    <div class="floating-social remote-social" id="partnerSocial" style="display: none;">
                        <a id="partnerInstaLink" href="#" target="_blank" style="display: none;" title="Instagram" class="social-btn instagram">
                            <svg class="social-svg-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                            </svg>
                        </a>
                        <a id="partnerWhatsappLink" href="#" target="_blank" style="display: none;" title="WhatsApp" class="social-btn whatsapp">
                            <svg class="social-svg-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                            </svg>
                        </a>
                    </div>
                </div>
                
                <div class="video-wrapper local-wrapper" id="localVideoContainer">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <div class="video-status">You</div>
                    <!-- My floating social icons -->
                    <div class="floating-social local-social" id="mySocial">
                        <a id="myInstaLink" href="#" target="_blank" style="display: none;" title="Instagram" class="social-btn instagram">
                            <svg class="social-svg-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                            </svg>
                        </a>
                        <a id="myWhatsappLink" href="#" target="_blank" style="display: none;" title="WhatsApp" class="social-btn whatsapp">
                            <svg class="social-svg-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                            </svg>
                        </a>
                    </div>
                </div>
            </section>

            <!-- Chat Area -->
            <aside class="chat-container">
                <div class="chat-header">
                    <h2>CHAT</h2>
                </div>
                <div id="chatMessages" class="chat-messages">
                    <div class="chat-messages-inner" id="chatMessagesInner">
                        <div class="system-message">Welcome to YELLOWCHAT. Click "Find Stranger" to start.</div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="Type a message..." disabled>
                    <button id="sendBtn" class="btn primary" disabled>
                        <i class="material-icons">send</i>
                    </button>
                </div>
            </aside>
        </main>

        <!-- Matching Animation Overlay -->
        <div id="matchingOverlay" class="matching-overlay" style="display: none;">
            <div class="matching-content">
                <div class="loader-wrapper">
                    <div class="loader-pulse"></div>
                    <div class="rotating-logo">
                        <svg class="logo-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15 10L20 6V18L15 14V17C15 18.1046 14.1046 19 13 19H4C2.89543 19 2 18.1046 2 17V7C2 5.89543 2.89543 5 4 5H13C14.1046 5 15 5.89543 15 7V10Z" fill="currentColor"/>
                        </svg>
                    </div>
                </div>
                <div class="matching-text-wrapper">
                    <div class="matching-text">SEARCHING</div>
                    <div class="loading-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Connection Transition Overlay -->
        <div id="transitionOverlay" class="transition-overlay" style="display: none;">
            <div class="transition-logo-wrapper">
                <svg class="logo-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 10L20 6V18L15 14V17C15 18.1046 14.1046 19 13 19H4C2.89543 19 2 18.1046 2 17V7C2 5.89543 2.89543 5 4 5H13C14.1046 5 15 5.89543 15 7V10Z" fill="currentColor"/>
                </svg>
            </div>
        </div>

        <!-- Gender Selection Modal (Force on first login) -->
        <div id="genderModal" class="modal">
            <div class="modal-content">
                <h2>Welcome!</h2>
                <p style="text-align: center; color: var(--text-muted); margin-bottom: 20px;">Please select your gender. This can only be set once.</p>
                <div class="gender-options">
                    <button class="gender-btn" data-gender="male">MALE</button>
                    <button class="gender-btn" data-gender="female">FEMALE</button>
                </div>
                <button id="confirmGenderBtn" class="btn primary" style="width: 100%; margin-top: 25px; justify-content: center;" disabled>Confirm Selection</button>
            </div>
        </div>

        <!-- Settings Modal (Hidden by default) -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2>Settings</h2>
                <div class="form-group">
                    <label>Match Preference (Gender)</label>
                    <select id="prefGender">
                        <option value="any">Any</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>My Gender (Immutable)</label>
                    <input type="text" id="myGenderDisplay" readonly>
                </div>
                <div class="form-group">
                    <label>Instagram ID (Optional)</label>
                    <input type="text" id="myInsta" placeholder="your_id">
                </div>
                <div class="form-group">
                    <label>WhatsApp Number (Optional, with country code)</label>
                    <input type="text" id="myWhatsapp" placeholder="e.g. +1234567890">
                </div>
                <div class="form-group" style="flex-direction: row; align-items: center; gap: 10px;">
                    <label style="margin: 0;">Show registered info to partner</label>
                    <input type="checkbox" id="showInfo" checked>
                </div>
                <button id="saveSettingsBtn" class="btn primary">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (ES Modules loaded directly in JS) -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
