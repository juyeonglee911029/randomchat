<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERCHAT</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header / Controls -->
        <header class="header">
            <div class="logo">
                <i class="material-icons" style="color: var(--primary);">videocam</i>
                <h1 style="color: var(--primary); font-weight: 700; letter-spacing: 1px;">CYBERCHAT</h1>
            </div>
            
            <div class="stats">
                <span class="stat-badge">Total Users: <span id="totalUsers">0</span></span>
                <span class="stat-badge" style="color: #FFD700; border-color: rgba(255, 215, 0, 0.3); background: rgba(255, 215, 0, 0.1);">Online Now: <span id="onlineUsers">0</span></span>
                <div id="google_translate_element"></div>
            </div>

            <div class="controls">
                <button id="googleLoginBtn" class="btn secondary">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 18px; height: 18px; margin-right: 5px;">
                    Login
                </button>
                <div id="userInfo" style="display: none; align-items: center; gap: 10px; margin-right: 15px;">
                    <img id="userAvatar" src="" alt="Avatar" style="width: 32px; height: 32px; border-radius: 50%;">
                    <span id="userName" style="font-weight: bold; color: white;"></span>
                </div>
                <button id="findMatchBtn" class="btn primary">
                    <i class="material-icons">shuffle</i>
                    Find Stranger
                </button>
                <button id="hangupBtn" class="btn danger" disabled>
                    <i class="material-icons">call_end</i>
                    Stop
                </button>
                <button id="settingsBtn" class="btn secondary">
                    <i class="material-icons">settings</i>
                </button>
            </div>
        </header>

        <main class="main-content">
            <!-- Left AdSense Sidebar -->
            <aside class="ad-sidebar">
                <div class="ad-container">
                    <!-- Google AdSense Code -->
                    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
                         data-ad-slot="1234567890"
                         data-ad-format="auto"
                         data-full-width-responsive="true"></ins>
                    <script>
                         (adsbygoogle = window.adsbygoogle || []).push({});
                    </script>
                    <div style="text-align:center; color: #888; font-size: 12px; margin-top: 10px;">Advertisement</div>
                </div>
            </aside>

            <!-- Video Area -->
            <section class="video-container">
                <div class="video-wrapper remote-wrapper">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div id="remoteStatus" class="video-status">Waiting for partner...</div>
                    <div class="social-links" id="partnerSocial" style="display: none;">
                        <!-- Dynamically populated -->
                    </div>
                </div>
                
                <div class="video-wrapper local-wrapper" id="localVideoContainer">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <div class="video-status">You</div>
                </div>
            </section>

            <!-- Chat Area -->
            <aside class="chat-container">
                <div class="chat-header">
                    <h2>Chat</h2>
                </div>
                <div id="chatMessages" class="chat-messages">
                    <div class="system-message">Welcome to CYBERCHAT. Click "Find Stranger" to start.</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="Type a message..." disabled>
                    <button id="sendBtn" class="btn primary" disabled>
                        <i class="material-icons">send</i>
                    </button>
                </div>
            </aside>
        </main>
        
        <!-- Bottom AdSense -->
        <div class="ad-bottom">
            <div class="ad-container-bottom">
                <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
                     data-ad-slot="0987654321"
                     data-ad-format="horizontal"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
                <div style="text-align:center; color: #888; font-size: 12px; margin-top: 5px;">Advertisement</div>
            </div>
        </div>

        <!-- Settings Modal (Hidden by default) -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2>Settings</h2>
                <div class="form-group">
                    <label>Match Preference (Gender)</label>
                    <select id="prefGender">
                        <option value="any">Any</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>My Gender</label>
                    <select id="myGender">
                        <option value="unspecified">Unspecified</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Instagram URL (Optional)</label>
                    <input type="url" id="myInsta" placeholder="https://instagram.com/yourhandle">
                </div>
                <button id="saveSettingsBtn" class="btn primary">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Google Translate Script -->
    <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'en', includedLanguages: 'ko,en,ja,zh-CN'}, 'google_translate_element');
    }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <!-- Firebase SDK (ES Modules loaded directly in JS) -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
