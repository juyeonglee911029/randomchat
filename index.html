<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YELLOWCHAT</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header / Controls -->
        <header class="header animated-header">
            <div class="logo">
                <div class="logo-icon-wrapper">
                    <span class="logo-emoji">📹</span>
                </div>
                <h1 class="logo-text">YELLOWCHAT</h1>
            </div>
            
            <div class="stats-container">
                <div class="stat-item">
                    <i class="material-icons">people</i>
                    <div class="stat-info">
                        <span class="stat-label">Total Users</span>
                        <span class="stat-value" id="totalUsers">0</span>
                    </div>
                </div>
                <div class="stat-item online">
                    <div class="pulse-dot"></div>
                    <div class="stat-info">
                        <span class="stat-label">Online Now</span>
                        <span class="stat-value" id="onlineUsers">0</span>
                    </div>
                </div>
                <div id="google_translate_element"></div>
            </div>

            <div class="controls">
                <button id="googleLoginBtn" class="btn secondary">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 18px; height: 18px; margin-right: 5px;">
                    Login
                </button>
                <div id="userInfo" style="display: none; align-items: center; gap: 10px; margin-right: 15px;">
                    <img id="userAvatar" src="" alt="Avatar" style="width: 32px; height: 32px; border-radius: 50%;">
                    <span id="userName" style="font-weight: bold; color: white;"></span>
                </div>
                <button id="findMatchBtn" class="btn primary">
                    <i class="material-icons">shuffle</i>
                    Find Stranger
                </button>
                <button id="hangupBtn" class="btn danger" disabled>
                    <i class="material-icons">call_end</i>
                    Stop
                </button>
                <button id="settingsBtn" class="btn secondary">
                    <i class="material-icons">settings</i>
                </button>
            </div>
        </header>

        <main class="main-content">
            <!-- Left AdSense Sidebar -->
            <aside class="ad-sidebar">
                <div class="ad-container">
                    <!-- Google AdSense Code -->
                    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4808753661346057" crossorigin="anonymous"></script>
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-client="ca-pub-4808753661346057"
                         data-ad-slot="1234567890"
                         data-ad-format="auto"
                         data-full-width-responsive="true"></ins>
                    <script>
                         (adsbygoogle = window.adsbygoogle || []).push({});
                    </script>
                    <div style="text-align:center; color: #888; font-size: 12px; margin-top: 10px;">Advertisement</div>
                </div>
            </aside>

            <!-- Video Area -->
            <section class="video-container">
                <div class="video-logo-overlay">
                    <span class="logo-emoji">📹</span>
                    <span class="logo-text">YELLOWCHAT</span>
                </div>

                <div class="video-wrapper remote-wrapper">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div id="remoteStatus" class="video-status">Waiting for partner...</div>
                    <div class="partner-info" id="partnerInfo" style="display: none;">
                        <span id="partnerName"></span> (<span id="partnerGender"></span>)
                    </div>
                    <!-- Partner floating social icons -->
                    <div class="floating-social remote-social" id="partnerSocial" style="display: none;">
                        <a id="partnerInstaLink" href="#" target="_blank" style="display: none;" title="Instagram">
                            <i class="material-icons">camera_alt</i>
                        </a>
                        <a id="partnerWhatsappLink" href="#" target="_blank" style="display: none;" title="WhatsApp">
                            <i class="material-icons">chat</i>
                        </a>
                    </div>
                </div>
                
                <div class="video-wrapper local-wrapper" id="localVideoContainer">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <div class="video-status">You</div>
                    <!-- My floating social icons -->
                    <div class="floating-social local-social" id="mySocial">
                        <a id="myInstaLink" href="#" target="_blank" style="display: none;" title="Instagram">
                            <i class="material-icons">camera_alt</i>
                        </a>
                        <a id="myWhatsappLink" href="#" target="_blank" style="display: none;" title="WhatsApp">
                            <i class="material-icons">chat</i>
                        </a>
                    </div>
                </div>
            </section>

            <!-- Chat Area -->
            <aside class="chat-container">
                <div class="chat-header">
                    <h2>Chat</h2>
                </div>
                <div id="chatMessages" class="chat-messages">
                    <div class="chat-messages-inner" id="chatMessagesInner">
                        <div class="system-message">Welcome to YELLOWCHAT. Click "Find Stranger" to start.</div>
                    </div>
                    <!-- Partner Instagram Display -->
                    <div id="partnerInstaDisplay" class="partner-insta-display" style="display: none;">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Insta" class="insta-logo-small">
                        <span id="partnerInstaId"></span>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="Type a message..." disabled>
                    <button id="sendBtn" class="btn primary" disabled>
                        <i class="material-icons">send</i>
                    </button>
                </div>
            </aside>
        </main>

        <!-- Settings Modal (Hidden by default) -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2>Settings</h2>
                <div class="form-group">
                    <label>Match Preference (Gender)</label>
                    <select id="prefGender">
                        <option value="any">Any</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>My Gender</label>
                    <select id="myGender">
                        <option value="unspecified">Unspecified</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Instagram ID (Optional)</label>
                    <input type="text" id="myInsta" placeholder="your_id">
                </div>
                <div class="form-group">
                    <label>WhatsApp Number (Optional, with country code)</label>
                    <input type="text" id="myWhatsapp" placeholder="e.g. +1234567890">
                </div>
                <div class="form-group" style="flex-direction: row; align-items: center; gap: 10px;">
                    <label style="margin: 0;">Show registered info to partner</label>
                    <input type="checkbox" id="showInfo" checked>
                </div>
                <button id="saveSettingsBtn" class="btn primary">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Google Translate Script -->
    <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'en', includedLanguages: 'ko,en,ja,zh-CN'}, 'google_translate_element');
    }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <!-- Firebase SDK (ES Modules loaded directly in JS) -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
